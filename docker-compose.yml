name: netwatch

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - DB_PATH=/data/network.sqlite
    volumes:
      - ./database:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
