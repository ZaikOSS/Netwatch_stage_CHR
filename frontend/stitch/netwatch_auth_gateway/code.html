<body class="bg-[#0f172a] text-on-surface min-h-screen flex flex-col items-center justify-center font-body-md overflow-hidden antialiased">
<!-- Top-left header -->
<header class="absolute top-0 left-0 w-full p-gutter flex justify-between items-start pointer-events-none z-10">
<div class="font-code-md text-code-md font-bold tracking-tight text-on-surface">
      NETWATCH // CHR_GHASSANI_LAN
    </div>
<!-- Decorative terminal cursor effect -->
<div class="font-code-md text-code-md text-on-surface-variant animate-pulse opacity-50">
      _
    </div>
</header>
<!-- Main Canvas -->
<main class="relative w-full max-w-md px-gutter z-20">
<!-- Authentication Card -->
<div class="bg-[#1e293b] border border-[#334155] rounded-lg p-lg shadow-none">
<!-- Header -->
<div class="mb-lg">
<h1 class="font-title-sm text-title-sm text-on-surface mb-xs">Authentication Required</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Enter credentials to access the network topology monitor.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-md" id="authForm" method="POST">
<!-- Username Input -->
<div class="space-y-sm">
<label class="font-label-caps text-label-caps text-on-surface uppercase block" for="username">Username</label>
<div class="relative">
<input class="w-full bg-[#0f172a] border border-[#334155] text-on-surface rounded font-code-md text-code-md p-sm focus:border-[#2563eb] focus:ring-1 focus:ring-[#2563eb] outline-none transition-colors" id="username" name="username" placeholder="e.g., admin_technician" required="" type="text"/>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-size: 16px;">person</span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-sm">
<div class="flex justify-between items-baseline">
<label class="font-label-caps text-label-caps text-on-surface uppercase block" for="password">Password</label>
<button class="font-code-md text-code-md text-primary hover:text-primary-fixed-dim transition-colors cursor-pointer bg-transparent border-none p-0 outline-none focus:underline" id="togglePassword" type="button">[Show]</button>
</div>
<div class="relative">
<input class="w-full bg-[#0f172a] border border-[#334155] text-on-surface rounded font-code-md text-code-md p-sm focus:border-[#2563eb] focus:ring-1 focus:ring-[#2563eb] outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-size: 16px;">key</span>
</div>
</div>
<!-- Primary Button -->
<div class="pt-sm">
<button class="w-full bg-[#2563eb] hover:bg-blue-500 text-white font-title-sm text-title-sm py-[10px] px-md rounded transition-colors flex items-center justify-center gap-sm outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#1e293b] focus:ring-[#2563eb]" type="submit">
             Sign In to Console
             <span class="material-symbols-outlined" style="font-size: 18px;">login</span>
</button>
</div>
</form>
<!-- Status Block (Default: Success/Connected) -->
<div class="mt-lg pt-md border-t border-[#334155] flex items-center gap-sm" id="statusBlock">
<div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shrink-0"></div>
<p class="font-code-md text-code-md text-on-surface-variant text-[11px] truncate">System Status: Local Network Agent Connected</p>
</div>
<!-- Status Block (Hidden: Failed State Example) -->

<script>
    // Minimal interaction script for password toggle
    document.addEventListener('DOMContentLoaded', () => {
      const toggleBtn = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('password');

        toggleBtn.addEventListener('click', () => {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          toggleBtn.textContent = type === 'password' ? '[Show]' : '[Hide]';
        });
      }
